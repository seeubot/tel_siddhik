<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Orey Admin Panel</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }
    body {
      background: #0b0f17;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem;
      width: 100%;
    }
    header {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border-bottom: 1px solid #334155;
      padding: 1.2rem 2rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-weight: 700;
      font-size: 1.6rem;
      letter-spacing: -0.5px;
      color: white;
    }
    .logo span {
      background: #3b82f6;
      padding: 0.2rem 0.8rem;
      border-radius: 20px;
      font-size: 0.9rem;
      color: white;
    }
    .admin-tag {
      background: #1e293b;
      padding: 0.4rem 1.2rem;
      border-radius: 30px;
      color: #94a3b8;
      font-size: 0.9rem;
      border: 1px solid #334155;
    }
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.25rem;
      margin: 1.75rem 0;
    }
    .stat-card {
      background: #1e293b;
      border-radius: 20px;
      padding: 1.4rem;
      border: 1px solid #334155;
      backdrop-filter: blur(10px);
      transition: all 0.2s;
    }
    .stat-card:hover {
      border-color: #3b82f6;
      transform: translateY(-2px);
    }
    .stat-label {
      font-size: 0.9rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .stat-value {
      font-size: 2.3rem;
      font-weight: 700;
      margin: 0.4rem 0 0.2rem;
    }
    .stat-desc {
      font-size: 0.8rem;
      color: #64748b;
    }
    .panel {
      background: #1e293b;
      border-radius: 24px;
      padding: 1.6rem;
      margin-bottom: 1.8rem;
      border: 1px solid #334155;
    }
    h2 {
      font-size: 1.4rem;
      margin-bottom: 1.3rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #f1f5f9;
    }
    .flex-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
    }
    button {
      background: #3b82f6;
      border: none;
      padding: 0.6rem 1.4rem;
      border-radius: 30px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: background 0.2s;
      font-size: 0.9rem;
      border: 1px solid #2563eb;
    }
    button.secondary {
      background: #334155;
      border-color: #475569;
    }
    button.danger {
      background: #b91c1c;
      border-color: #dc2626;
    }
    button:hover {
      background: #2563eb;
    }
    button.danger:hover {
      background: #991b1b;
    }
    input, select, textarea {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 0.7rem 1rem;
      color: #e2e8f0;
      font-size: 0.9rem;
      outline: none;
      width: 100%;
      margin-bottom: 0.8rem;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #3b82f6;
    }
    .table-wrapper {
      overflow-x: auto;
      border-radius: 16px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    th {
      text-align: left;
      padding: 0.9rem 0.8rem;
      background: #0f172a;
      color: #94a3b8;
      font-weight: 600;
    }
    td {
      padding: 0.8rem;
      border-bottom: 1px solid #334155;
    }
    .badge {
      background: #334155;
      padding: 0.2rem 0.7rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge.active { background: #16a34a; color: white; }
    .badge.pending { background: #ea580c; }
    .badge.banned { background: #b91c1c; color: white; }
    .badge.high { background: #7e22ce; }
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1e293b;
      border: 1px solid #3b82f6;
      padding: 0.9rem 1.5rem;
      border-radius: 20px;
      color: white;
      z-index: 9999;
      display: none;
    }
    .config-section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.2rem;
    }
    hr {
      border-color: #334155;
      margin: 1.2rem 0;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">🔷 OREY <span>ADMIN</span></div>
    <div class="admin-tag" id="connectionStatus">🟡 Connecting...</div>
  </header>
  <div class="container">
    <!-- Stats Grid -->
    <div class="dashboard-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-label">Active Connections</div><div class="stat-value" id="activeConn">-</div></div>
      <div class="stat-card"><div class="stat-label">Active Rooms</div><div class="stat-value" id="activeRooms">-</div></div>
      <div class="stat-card"><div class="stat-label">Banned Devices</div><div class="stat-value" id="bannedCount">-</div></div>
      <div class="stat-card"><div class="stat-label">Pending Reports</div><div class="stat-value" id="pendingReports">-</div></div>
    </div>

    <!-- Reports Section -->
    <div class="panel">
      <h2>🚨 Reports</h2>
      <div class="flex-row" style="margin-bottom:1rem;">
        <button onclick="loadReports()">🔄 Refresh</button>
        <select id="reportFilter" onchange="loadReports()" style="width:auto; margin:0;">
          <option value="">All Status</option>
          <option value="pending">Pending</option>
          <option value="auto_banned">Auto Banned</option>
          <option value="banned">Banned</option>
          <option value="dismissed">Dismissed</option>
        </select>
      </div>
      <div class="table-wrapper">
        <table>
          <thead><tr><th>ID</th><th>Reported Device</th><th>Reason</th><th>Priority</th><th>Status</th><th>Action</th></tr></thead>
          <tbody id="reportsTable"></tbody>
        </table>
      </div>
    </div>

    <!-- Banned Devices -->
    <div class="panel">
      <h2>🛑 Banned Devices</h2>
      <div class="flex-row">
        <button onclick="loadBannedDevices()">Refresh</button>
        <input type="text" id="banDeviceId" placeholder="Device ID to ban" style="width:250px; margin:0;">
        <input type="text" id="banReason" placeholder="Reason" style="width:180px; margin:0;">
        <input type="number" id="banDuration" placeholder="Hours (0=permanent)" style="width:120px; margin:0;" value="720">
        <button class="danger" onclick="banDevice()">Ban Device</button>
      </div>
      <div class="table-wrapper" style="margin-top:1rem;">
        <table>
          <thead><tr><th>Device ID</th><th>Reason</th><th>Expires</th><th>Source</th><th>Unban</th></tr></thead>
          <tbody id="bannedTable"></tbody>
        </table>
      </div>
    </div>

    <!-- Notifications -->
    <div class="panel">
      <h2>📢 Send Notification</h2>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem;">
        <input type="text" id="notifTitle" placeholder="Title" />
        <input type="text" id="notifMessage" placeholder="Message" />
        <select id="notifType"><option value="info">Info</option><option value="warning">Warning</option><option value="alert">Alert</option></select>
        <input type="text" id="notifImageUrl" placeholder="Image URL (optional)" />
        <input type="text" id="notifActionUrl" value="/" placeholder="Action URL" />
        <input type="number" id="notifExpiresIn" value="30" placeholder="Expires in days" />
      </div>
      <button onclick="sendNotification()" style="margin-top:1rem;">📤 Send Broadcast</button>
    </div>

    <!-- Server Config -->
    <div class="panel">
      <h2>⚙️ Server Configuration</h2>
      <div class="config-section">
        <div>
          <label>Maintenance Mode</label>
          <select id="maintEnabled" onchange="updateMaintenance()">
            <option value="false">Disabled</option><option value="true">Enabled</option>
          </select>
          <input type="text" id="maintMessage" placeholder="Maintenance message" onchange="updateMaintenance()" />
        </div>
        <div>
          <label>Default Video Quality</label>
          <select id="videoQualityDefault" onchange="updateVideoQuality()">
            <option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option><option value="hd">HD</option>
          </select>
          <label>Auto Adjust <input type="checkbox" id="autoAdjust" checked onchange="updateVideoQuality()"></label>
        </div>
        <div>
          <label>Auto Ban Threshold</label>
          <input type="number" id="autoBanThreshold" value="3" onchange="updateSafety()" />
          <label>High Priority Threshold</label>
          <input type="number" id="highPriorityThreshold" value="2" onchange="updateSafety()" />
        </div>
      </div>
    </div>
  </div>
  <div id="toast" class="toast">✅ Action completed</div>

  <script>
    const ADMIN_KEY = 'maya@1660440'; // Match server ADMIN_KEY
    const BASE = window.location.origin;
    
    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 3000);
    }

    async function apiCall(url, method = 'GET', body = null) {
      const headers = { 'x-admin-key': ADMIN_KEY, 'Content-Type': 'application/json' };
      const options = { method, headers };
      if (body) options.body = JSON.stringify(body);
      const res = await fetch(url, options);
      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: 'Request failed' }));
        throw new Error(err.error || 'Error');
      }
      return res.json();
    }

    async function loadStats() {
      try {
        const data = await apiCall(`${BASE}/admin/stats`);
        document.getElementById('activeConn').textContent = data.activeConnections || 0;
        document.getElementById('activeRooms').textContent = data.activeRooms || 0;
        document.getElementById('bannedCount').textContent = data.bannedDevices || 0;
        document.getElementById('pendingReports').textContent = data.pendingReports || 0;
        document.getElementById('connectionStatus').innerHTML = '🟢 Connected';
      } catch (e) {
        document.getElementById('connectionStatus').innerHTML = '🔴 Offline';
      }
    }

    async function loadReports() {
      const status = document.getElementById('reportFilter').value;
      let url = `${BASE}/admin/reports`;
      if (status) url += `?status=${status}`;
      try {
        const data = await apiCall(url);
        const tbody = document.getElementById('reportsTable');
        tbody.innerHTML = '';
        data.reports.slice(0, 30).forEach(r => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${r.id?.substring(0,8)}</td>
            <td>${(r.reportedDeviceId || '').substring(0,14)}...</td>
            <td>${r.reason}</td>
            <td><span class="badge ${r.isHighPriority ? 'high' : ''}">${r.isHighPriority ? 'HIGH' : 'normal'}</span></td>
            <td><span class="badge ${r.status === 'pending' ? 'pending' : 'banned'}">${r.status}</span></td>
            <td>
              ${r.status === 'pending' ? `<button onclick="actOnReport('${r.id}','ban')">Ban</button>
              <button class="secondary" onclick="actOnReport('${r.id}','dismiss')">Dismiss</button>` : 'Reviewed'}
            </td>`;
          tbody.appendChild(tr);
        });
      } catch (e) { toast('Failed to load reports'); }
    }

    async function actOnReport(reportId, action) {
      try {
        await apiCall(`${BASE}/admin/reports/${reportId}/action`, 'POST', { action });
        toast(`Report ${action} successful`);
        loadReports();
        loadStats();
      } catch (e) { toast(e.message); }
    }

    async function loadBannedDevices() {
      try {
        const data = await apiCall(`${BASE}/admin/banned-devices`);
        const tbody = document.getElementById('bannedTable');
        tbody.innerHTML = '';
        data.bannedDevices.forEach(b => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${b.deviceId.substring(0,16)}...</td>
            <td>${b.reason}</td>
            <td>${b.permanent ? 'Permanent' : b.expiresAt ? new Date(b.expiresAt).toLocaleDateString() : 'N/A'}</td>
            <td>${b.source}</td>
            <td><button class="danger" onclick="unbanDevice('${encodeURIComponent(b.deviceId)}')">Unban</button></td>`;
          tbody.appendChild(tr);
        });
      } catch (e) { toast('Failed to load bans'); }
    }

    async function banDevice() {
      const deviceId = document.getElementById('banDeviceId').value.trim();
      const reason = document.getElementById('banReason').value.trim() || 'Manual ban';
      const duration = parseInt(document.getElementById('banDuration').value) || 0;
      if (!deviceId) return toast('Device ID required');
      try {
        await apiCall(`${BASE}/admin/ban-device`, 'POST', { deviceId, reason, durationHours: duration || null });
        toast('Device banned');
        loadBannedDevices();
        loadStats();
      } catch (e) { toast(e.message); }
    }

    async function unbanDevice(encodedId) {
      try {
        await apiCall(`${BASE}/admin/ban-device/${encodedId}`, 'DELETE');
        toast('Device unbanned');
        loadBannedDevices();
      } catch (e) { toast(e.message); }
    }

    async function sendNotification() {
      const title = document.getElementById('notifTitle').value.trim();
      const message = document.getElementById('notifMessage').value.trim();
      if (!title || !message) return toast('Title and message required');
      const body = {
        title, message,
        type: document.getElementById('notifType').value,
        imageUrl: document.getElementById('notifImageUrl').value || null,
        actionUrl: document.getElementById('notifActionUrl').value,
        expiresIn: parseInt(document.getElementById('notifExpiresIn').value) || 30
      };
      try {
        await apiCall(`${BASE}/admin/notifications`, 'POST', body);
        toast('Notification sent!');
      } catch (e) { toast(e.message); }
    }

    async function updateMaintenance() {
      const enabled = document.getElementById('maintEnabled').value === 'true';
      const message = document.getElementById('maintMessage').value;
      try {
        await apiCall(`${BASE}/admin/maintenance`, 'POST', { enabled, message });
        toast('Maintenance updated');
      } catch (e) { toast(e.message); }
    }

    async function updateVideoQuality() {
      const def = document.getElementById('videoQualityDefault').value;
      const autoAdjust = document.getElementById('autoAdjust').checked;
      try {
        await apiCall(`${BASE}/admin/video-quality`, 'PUT', { default: def, autoAdjust });
        toast('Video quality updated');
      } catch (e) { toast(e.message); }
    }

    async function updateSafety() {
      const autoBanThreshold = parseInt(document.getElementById('autoBanThreshold').value) || 3;
      const highPriorityThreshold = parseInt(document.getElementById('highPriorityThreshold').value) || 2;
      try {
        await apiCall(`${BASE}/admin/safety-settings`, 'PUT', { autoBanThreshold, highPriorityThreshold });
        toast('Safety settings updated');
      } catch (e) { toast(e.message); }
    }

    // Initial load
    window.onload = () => {
      loadStats();
      loadReports();
      loadBannedDevices();
      setInterval(loadStats, 15000);
    };
  </script>
</body>
</html>
