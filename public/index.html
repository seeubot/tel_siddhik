<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexCall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1a1a1a; --panel: #242424; --border: #333;
      --accent: #ff6b35; --accent-h: #ff8555;
      --danger: #e74c3c; --success: #2ecc71;
      --text: #f0f0f0; --muted: #888; --chat-bg: #1e1e1e;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

    /* LOBBY */
    #lobby { height: 100vh; display: flex; align-items: center; justify-content: center; background: #111; }
    .lobby-wrap { width: 100%; max-width: 420px; padding: 20px; }
    .lobby-brand { text-align: center; margin-bottom: 40px; }
    .lobby-brand h1 { font-size: 36px; font-weight: 700; color: var(--accent); letter-spacing: -1px; }
    .lobby-brand p { color: var(--muted); font-size: 14px; margin-top: 6px; }
    .lobby-card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 32px; }
    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
    .field input { width: 100%; background: #2d2d2d; border: 1px solid var(--border); border-radius: 8px; padding: 11px 14px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; outline: none; transition: border-color 0.15s; }
    .field input:focus { border-color: var(--accent); }
    .field input::placeholder { color: #555; }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s, transform 0.1s; }
    .btn:active { transform: scale(0.98); }
    .btn-orange { background: var(--accent); color: #fff; margin-bottom: 10px; }
    .btn-orange:hover { background: var(--accent-h); }
    .btn-ghost { background: #2d2d2d; color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: #666; }
    .divider { display: flex; align-items: center; gap: 10px; margin: 18px 0; color: var(--muted); font-size: 12px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ROOM */
    #room { display: none; height: 100vh; flex-direction: row; background: #111; }
    #room.active { display: flex; }

    /* Video section */
    .video-section { flex: 1; display: flex; flex-direction: column; position: relative; background: #000; overflow: hidden; }
    #stranger-wrap { flex: 1; position: relative; background: #0a0a0a; display: flex; align-items: center; justify-content: center; }
    #stranger-video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .stranger-label { position: absolute; top: 14px; left: 14px; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); border-radius: 6px; padding: 5px 12px; font-size: 13px; font-weight: 600; color: #fff; }
    #waiting-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0a0a; gap: 16px; }
    .waiting-spinner { width: 48px; height: 48px; border: 3px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .waiting-text { font-size: 15px; color: var(--muted); font-weight: 500; }

    /* PiP */
    #local-wrap { position: absolute; bottom: 80px; right: 16px; width: 200px; aspect-ratio: 4/3; background: #1a1a1a; border-radius: 10px; overflow: hidden; border: 2px solid rgba(255,255,255,0.12); box-shadow: 0 8px 32px rgba(0,0,0,0.6); z-index: 10; cursor: move; user-select: none; }
    #local-video { width: 100%; height: 100%; object-fit: cover; display: block; transform: scaleX(-1); }
    .local-label { position: absolute; bottom: 6px; left: 8px; font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.8); background: rgba(0,0,0,0.5); border-radius: 4px; padding: 2px 7px; }
    .pip-mute-icon { position: absolute; top: 6px; right: 6px; background: rgba(231,76,60,0.85); border-radius: 50%; width: 22px; height: 22px; display: none; align-items: center; justify-content: center; font-size: 11px; }
    .pip-mute-icon.show { display: flex; }

    /* Controls */
    .controls-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 68px; background: rgba(0,0,0,0.75); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: center; gap: 12px; z-index: 20; }
    .ctrl { width: 46px; height: 46px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all 0.15s; background: rgba(255,255,255,0.1); color: #fff; }
    .ctrl:hover { background: rgba(255,255,255,0.18); transform: scale(1.08); }
    .ctrl.off { background: rgba(231,76,60,0.3); color: #e74c3c; }
    .ctrl.end { background: var(--danger); width: 52px; height: 52px; font-size: 20px; }
    .ctrl.end:hover { background: #c0392b; }
    .room-id-pill { position: absolute; left: 14px; font-size: 12px; color: var(--muted); background: rgba(255,255,255,0.06); border-radius: 20px; padding: 5px 12px; cursor: pointer; transition: color 0.15s; white-space: nowrap; }
    .room-id-pill:hover { color: var(--accent); }

    /* Chat */
    .chat-section { width: 320px; flex-shrink: 0; display: flex; flex-direction: column; background: var(--chat-bg); border-left: 1px solid var(--border); }
    .chat-header { padding: 16px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .chat-header-title { font-size: 14px; font-weight: 600; }
    .conn-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .conn-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
    .conn-dot.connected { background: var(--success); box-shadow: 0 0 5px var(--success); }
    .conn-dot.waiting { background: var(--accent); animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.3} }
    #messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; scrollbar-width: thin; scrollbar-color: #333 transparent; }
    .msg { max-width: 85%; display: flex; flex-direction: column; gap: 3px; }
    .msg.mine { align-self: flex-end; }
    .msg.theirs { align-self: flex-start; }
    .msg-sender { font-size: 10px; font-weight: 600; color: var(--muted); padding: 0 4px; }
    .msg.mine .msg-sender { text-align: right; color: var(--accent); }
    .msg-bubble { padding: 8px 12px; border-radius: 12px; font-size: 14px; line-height: 1.45; word-break: break-word; }
    .msg.mine .msg-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 3px; }
    .msg.theirs .msg-bubble { background: #2d2d2d; color: var(--text); border-bottom-left-radius: 3px; }
    .sys-line { text-align: center; font-size: 11px; color: #555; padding: 2px 0; }
    .chat-input-area { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: center; }
    .chat-input-area input { flex: 1; background: #2d2d2d; border: 1px solid var(--border); border-radius: 8px; padding: 10px 13px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; outline: none; transition: border-color 0.15s; }
    .chat-input-area input:focus { border-color: var(--accent); }
    .chat-input-area input::placeholder { color: #555; }
    .send-btn { width: 38px; height: 38px; border-radius: 8px; background: var(--accent); border: none; color: #fff; font-size: 15px; cursor: pointer; flex-shrink: 0; transition: background 0.15s; display: flex; align-items: center; justify-content: center; }
    .send-btn:hover { background: var(--accent-h); }
    #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px); background: #333; border: 1px solid #444; border-radius: 8px; padding: 10px 18px; font-size: 13px; transition: transform 0.25s ease; z-index: 999; pointer-events: none; white-space: nowrap; }
    #toast.show { transform: translateX(-50%) translateY(0); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  </style>
</head>
<body>

<div id="lobby">
  <div class="lobby-wrap">
    <div class="lobby-brand">
      <h1>NexCall</h1>
      <p>Talk to strangers. One at a time.</p>
    </div>
    <div class="lobby-card">
      <div class="field">
        <label>Your Name</label>
        <input type="text" id="user-name" placeholder="Enter your name…" maxlength="24" />
      </div>
      <button class="btn btn-orange" onclick="createRoom()">▶ Start New Chat</button>
      <div class="divider">or join with a Room ID</div>
      <div class="field">
        <label>Room ID</label>
        <input type="text" id="room-id-input" placeholder="8-character code…" maxlength="8" style="text-transform:uppercase;letter-spacing:0.1em;" />
      </div>
      <button class="btn btn-ghost" onclick="joinRoom()">→ Join Room</button>
    </div>
  </div>
</div>

<div id="room">
  <div class="video-section">
    <div id="stranger-wrap">
      <video id="stranger-video" autoplay playsinline></video>
      <div class="stranger-label" id="stranger-label">Stranger</div>
      <div id="waiting-overlay">
        <div class="waiting-spinner"></div>
        <div class="waiting-text">Waiting for someone to join…</div>
      </div>
    </div>
    <div id="local-wrap">
      <video id="local-video" autoplay muted playsinline></video>
      <div class="local-label" id="local-label">You</div>
      <div class="pip-mute-icon" id="pip-mute">🔇</div>
    </div>
    <div class="controls-bar">
      <div class="room-id-pill" onclick="copyRoomId()" id="room-id-pill">Room: —</div>
      <button class="ctrl" id="mic-btn" onclick="toggleAudio()" title="Mute">🎙️</button>
      <button class="ctrl end" onclick="leaveRoom()" title="Leave">📵</button>
      <button class="ctrl" id="cam-btn" onclick="toggleVideo()" title="Camera">📷</button>
    </div>
  </div>
  <div class="chat-section">
    <div class="chat-header">
      <span class="chat-header-title">Chat</span>
      <div class="conn-status">
        <div class="conn-dot waiting" id="conn-dot"></div>
        <span id="conn-label">Waiting…</span>
      </div>
    </div>
    <div id="messages"></div>
    <div class="chat-input-area">
      <input type="text" id="chat-input" placeholder="Type a message…" onkeydown="if(event.key==='Enter') sendChat()" />
      <button class="send-btn" onclick="sendChat()">➤</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let localStream = null, currentRoomId = null, myName = '', strangerName = '', strangerId = null;
let audioEnabled = true, videoEnabled = true, pc = null;

const ICE = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] };

async function createRoom() {
  const name = document.getElementById('user-name').value.trim();
  if (!name) { showToast('Please enter your name'); return; }
  const res = await fetch('/create-room');
  const { roomId } = await res.json();
  await enterRoom(roomId, name);
}

async function joinRoom() {
  const name = document.getElementById('user-name').value.trim();
  const roomId = document.getElementById('room-id-input').value.trim().toUpperCase();
  if (!name) { showToast('Please enter your name'); return; }
  if (roomId.length !== 8) { showToast('Room ID must be 8 characters'); return; }
  await enterRoom(roomId, name);
}

async function enterRoom(roomId, name) {
  myName = name; currentRoomId = roomId;
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  } catch { showToast('Camera/mic access denied'); return; }
  document.getElementById('local-video').srcObject = localStream;
  document.getElementById('local-label').textContent = name;
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('room').classList.add('active');
  document.getElementById('room-id-pill').textContent = 'Room: ' + roomId;
  socket.emit('join-room', { roomId, userName: name });
}

socket.on('room-joined', async ({ peers }) => {
  if (peers.length > 0) {
    strangerId = peers[0].socketId; strangerName = peers[0].userName;
    showStranger();
    const peerConn = createPC(strangerId);
    const offer = await peerConn.createOffer();
    await peerConn.setLocalDescription(offer);
    socket.emit('offer', { targetId: strangerId, offer });
  }
});

socket.on('user-joined', ({ socketId, userName }) => {
  strangerId = socketId; strangerName = userName;
  showStranger(); addSysMsg(userName + ' connected');
});

socket.on('offer', async ({ offer, fromId, fromName }) => {
  strangerId = fromId; strangerName = fromName;
  showStranger();
  const peerConn = createPC(fromId);
  await peerConn.setRemoteDescription(offer);
  const answer = await peerConn.createAnswer();
  await peerConn.setLocalDescription(answer);
  socket.emit('answer', { targetId: fromId, answer });
});

socket.on('answer', async ({ answer }) => { if (pc) await pc.setRemoteDescription(answer); });
socket.on('ice-candidate', async ({ candidate }) => { if (pc && candidate) await pc.addIceCandidate(candidate); });

socket.on('user-left', ({ userName }) => {
  hideStranger(); addSysMsg((userName || 'Stranger') + ' disconnected');
  setConnStatus(false); strangerId = null; strangerName = '';
  if (pc) { pc.close(); pc = null; }
});

socket.on('chat-message', ({ socketId, userName, message }) => {
  appendMsg(userName, message, socketId === socket.id);
});

socket.on('room-full', () => showToast('Room is full — only 2 people allowed'));

socket.on('peer-media-state', ({ audioEnabled: a, videoEnabled: v }) => {
  document.getElementById('stranger-label').textContent = strangerName + (!a ? ' 🔇' : '') + (!v ? ' 📵' : '');
});

function createPC(targetId) {
  if (pc) { pc.close(); pc = null; }
  pc = new RTCPeerConnection(ICE);
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  pc.onicecandidate = ({ candidate }) => { if (candidate) socket.emit('ice-candidate', { targetId, candidate }); };
  pc.ontrack = ({ streams: [stream] }) => {
    document.getElementById('stranger-video').srcObject = stream;
    setConnStatus(true);
  };
  pc.onconnectionstatechange = () => {
    if (['disconnected','failed','closed'].includes(pc.connectionState)) { hideStranger(); setConnStatus(false); }
  };
  return pc;
}

function showStranger() { document.getElementById('waiting-overlay').style.display = 'none'; document.getElementById('stranger-label').textContent = strangerName || 'Stranger'; }
function hideStranger() { document.getElementById('waiting-overlay').style.display = 'flex'; document.getElementById('stranger-video').srcObject = null; }

function setConnStatus(connected) {
  document.getElementById('conn-dot').className = 'conn-dot ' + (connected ? 'connected' : 'waiting');
  document.getElementById('conn-label').textContent = connected ? 'Connected' : 'Waiting…';
}

function toggleAudio() {
  if (!localStream) return;
  audioEnabled = !audioEnabled;
  localStream.getAudioTracks().forEach(t => t.enabled = audioEnabled);
  const btn = document.getElementById('mic-btn');
  btn.textContent = audioEnabled ? '🎙️' : '🔇';
  btn.className = 'ctrl' + (audioEnabled ? '' : ' off');
  document.getElementById('pip-mute').classList.toggle('show', !audioEnabled);
  socket.emit('media-state', { roomId: currentRoomId, audioEnabled, videoEnabled });
}

function toggleVideo() {
  if (!localStream) return;
  videoEnabled = !videoEnabled;
  localStream.getVideoTracks().forEach(t => t.enabled = videoEnabled);
  const btn = document.getElementById('cam-btn');
  btn.textContent = videoEnabled ? '📷' : '📵';
  btn.className = 'ctrl' + (videoEnabled ? '' : ' off');
  socket.emit('media-state', { roomId: currentRoomId, audioEnabled, videoEnabled });
}

function leaveRoom() {
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  if (pc) { pc.close(); pc = null; }
  socket.disconnect(); location.reload();
}

function copyRoomId() {
  if (!currentRoomId) return;
  navigator.clipboard.writeText(currentRoomId).then(() => showToast('Copied: ' + currentRoomId));
}

function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  socket.emit('chat-message', { roomId: currentRoomId, message: msg });
  input.value = '';
}

function appendMsg(name, text, isMine) {
  const box = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + (isMine ? 'mine' : 'theirs');
  div.innerHTML = '<div class="msg-sender">' + name + '</div><div class="msg-bubble">' + escHtml(text) + '</div>';
  box.appendChild(div); box.scrollTop = box.scrollHeight;
}

function addSysMsg(text) {
  const box = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'sys-line'; div.textContent = text;
  box.appendChild(div); box.scrollTop = box.scrollHeight;
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// Draggable PiP
(function() {
  const pip = document.getElementById('local-wrap');
  let dragging = false, ox = 0, oy = 0;
  pip.addEventListener('mousedown', e => { dragging = true; ox = e.clientX - pip.offsetLeft; oy = e.clientY - pip.offsetTop; pip.style.cursor = 'grabbing'; });
  document.addEventListener('mousemove', e => { if (!dragging) return; pip.style.right = 'auto'; pip.style.bottom = 'auto'; pip.style.left = (e.clientX - ox) + 'px'; pip.style.top = (e.clientY - oy) + 'px'; });
  document.addEventListener('mouseup', () => { dragging = false; pip.style.cursor = 'move'; });
})();

document.addEventListener('DOMContentLoaded', () => document.getElementById('user-name').focus());
</script>
</body>
</html>
