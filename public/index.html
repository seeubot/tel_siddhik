
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Orey | Connect</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #030407;
  --panel: rgba(13, 17, 23, 0.75);
  --accent: #EAB308;
  --accent-glow: rgba(234, 179, 8, 0.25);
  --text: #F8FAFC;
  --text-muted: #94A3B8;
  --border: rgba(255, 255, 255, 0.08);
  --glass: blur(24px);
  --font-main: 'Plus Jakarta Sans', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --sb: env(safe-area-inset-bottom, 0px);
  --st: env(safe-area-inset-top, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-main);
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center; justify-content: center;
}

.bg-blobs { position: fixed; inset: 0; z-index: -1; overflow: hidden; background: radial-gradient(circle at 50% 50%, #0c0e14 0%, #030407 100%); }
.blob { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.3; animation: float 25s infinite alternate; }
.blob-1 { width: 500px; height: 500px; background: #1e293b; top: -100px; left: -100px; }
.blob-2 { width: 400px; height: 400px; background: #854d0e; bottom: -50px; right: -50px; animation-delay: -5s; }

@keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(60px, 120px) scale(1.1); } }

.screen { display: none; position: fixed; inset: 0; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; }
.screen.active { display: flex; }

.auth-card {
  width: 100%; max-width: 420px;
  background: var(--panel); backdrop-filter: var(--glass);
  border: 1px solid var(--border); border-radius: 32px;
  padding: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
  animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes cardIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.brand { text-align: center; margin-bottom: 2rem; }
.brand h1 { 
  font-size: 2.5rem; font-weight: 800; letter-spacing: -0.04em;
  background: linear-gradient(to bottom right, #fff, #94a3b8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.brand p { font-size: 0.875rem; color: var(--text-muted); margin-top: 0.5rem; }

.input-group { margin-bottom: 1.25rem; }
.input-label { display: block; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 0.5rem; }

.input-field {
  width: 100%; background: rgba(0,0,0,0.25); border: 1px solid var(--border);
  border-radius: 16px; padding: 1rem 1.25rem; color: #fff;
  font-family: inherit; font-size: 1rem; transition: 0.2s;
}
.input-field:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-glow); }

.id-display {
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,255,255,0.03); border: 1px dashed var(--border);
  padding: 0.85rem 1rem; border-radius: 14px; margin-bottom: 1.5rem;
}
.id-code { font-family: var(--font-mono); color: var(--accent); font-weight: 500; font-size: 0.95rem; }

.primary-btn {
  width: 100%; background: var(--accent); color: #000; border: none;
  padding: 1.1rem; border-radius: 16px; font-weight: 700; font-size: 1rem;
  cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 0.75rem;
}
.primary-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 24px -6px var(--accent-glow); }
.primary-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.wait-indicator { 
    display: none; padding: 1rem; text-align: center; color: var(--accent); 
    font-size: 0.9rem; font-weight: 600; border: 1px solid var(--accent-glow);
    border-radius: 16px; background: var(--accent-glow); margin-bottom: 1rem;
}
.wait-indicator.on { display: block; }

.divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; color: var(--text-muted); font-size: 0.7rem; font-weight: 700; }
.divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }

/* CALL UI */
#call-screen { background: #000; padding: 0; }
.video-grid { position: absolute; inset: 0; z-index: 1; }
#remoteVideo { width: 100%; height: 100%; object-fit: cover; }

.remote-placeholder {
    position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
    background: #05060a; z-index: 2; flex-direction: column; gap: 1rem;
}
.remote-placeholder.on { display: flex; }
.big-av { width: 80px; height: 80px; border-radius: 50%; background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: 800; }

.top-bar { position: absolute; top: calc(1rem + var(--st)); left: 1rem; right: 1rem; z-index: 10; display: flex; justify-content: space-between; align-items: center; }
.pill { background: rgba(0,0,0,0.5); backdrop-filter: var(--glass); border: 1px solid var(--border); border-radius: 100px; padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.75rem; }

.pip-window {
  position: absolute; bottom: calc(6.5rem + var(--sb)); right: 1.25rem;
  width: 110px; height: 160px; background: #111; border-radius: 20px;
  border: 2px solid rgba(255,255,255,0.1); overflow: hidden; z-index: 5;
}
#localVideo { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

.controls-wrapper { position: absolute; bottom: calc(1.5rem + var(--sb)); left: 1rem; right: 1rem; z-index: 10; display: flex; justify-content: center; }
.controls { background: rgba(13, 17, 23, 0.85); backdrop-filter: var(--glass); border: 1px solid var(--border); border-radius: 24px; padding: 0.6rem; display: flex; align-items: center; gap: 0.4rem; }
.ctrl-btn { width: 50px; height: 50px; border-radius: 16px; border: none; background: transparent; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
.ctrl-btn:hover { background: rgba(255,255,255,0.08); }
.ctrl-btn.off { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
.end-btn { background: #ef4444 !important; width: 60px; border-radius: 18px; }

.toast { position: fixed; top: 2rem; left: 50%; transform: translateX(-50%) translateY(-20px); background: var(--accent); color: #000; padding: 0.7rem 1.4rem; border-radius: 100px; font-weight: 700; font-size: 0.85rem; opacity: 0; transition: 0.3s; z-index: 1000; pointer-events: none; }
.toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="bg-blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>

<!-- LOBBY -->
<div id="lobby-screen" class="screen active">
  <div class="auth-card">
    <div class="brand"><h1>Orey</h1><p>Connect with the world instantly</p></div>

    <div class="input-group">
      <label class="input-label">Username</label>
      <input type="text" id="userName" class="input-field" placeholder="How should we call you?" maxlength="20">
    </div>

    <div class="input-group">
      <label class="input-label">Your Orey ID</label>
      <div class="id-display">
        <span class="id-code" id="myOreyId">Generating...</span>
        <svg onclick="copyMyId()" style="cursor:pointer;color:var(--text-muted)" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
      </div>
    </div>

    <div id="waitIndicator" class="wait-indicator">Searching for a partner...</div>

    <button id="randomBtn" class="primary-btn" onclick="joinRandom()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
      Join Random Match
    </button>

    <div class="divider">OR JOIN BY ID</div>

    <div class="input-group" style="display:flex; gap:0.5rem">
      <input type="text" id="targetOreyId" class="input-field" placeholder="Orey-XXXX-XXXX">
      <button class="primary-btn" style="width: auto; padding: 0 1.2rem;" onclick="connectById()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </button>
    </div>
    
    <div id="lobStatus" style="text-align:center; font-size:0.8rem; color:#ef4444; min-height:1.2em"></div>
  </div>
</div>

<!-- CALL SCREEN -->
<div id="call-screen" class="screen">
  <div class="top-bar">
    <div class="pill">
      <div style="width:8px; height:8px; background:#22c55e; border-radius:50%; box-shadow:0 0 8px #22c55e"></div>
      <span id="callTimer" style="font-family:var(--font-mono); font-size: 0.8rem;">00:00</span>
    </div>
    <div class="pill">
      <span id="remoteUserName" style="font-weight:600; font-size:0.9rem">Connecting...</span>
    </div>
  </div>

  <div class="video-grid">
    <video id="remoteVideo" autoplay playsinline></video>
    <div id="remotePlaceholder" class="remote-placeholder">
        <div class="big-av" id="bigAv">?</div>
        <p id="placeholderName">Waiting for user...</p>
    </div>
  </div>

  <div class="pip-window">
    <video id="localVideo" autoplay muted playsinline></video>
  </div>

  <div class="controls-wrapper">
    <div class="controls">
      <button class="ctrl-btn" id="micBtn" onclick="toggleMic()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
      </button>
      <button class="ctrl-btn" id="camBtn" onclick="toggleCam()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"></path><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
      </button>
      <div style="width:1px; height:24px; background:var(--border); margin: 0 0.4rem"></div>
      <button class="ctrl-btn end-btn" onclick="endCall()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
let socket, localStream, pc;
let myId = null, roomId = null, peerId = null;
let audioOn = true, videoOn = true;
let t0 = null, timerIv = null;

const ICE = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] };

const $ = id => document.getElementById(id);
const getUsername = () => $('userName').value.trim() || 'Anonymous';

window.onload = async () => {
    await genId();
    initSock();
};

async function genId() {
    try {
        const d = await (await fetch('/generate-orey-id')).json();
        myId = d.oreyId;
        $('myOreyId').textContent = myId;
    } catch { 
        $('myOreyId').textContent = 'Error loading ID';
    }
}

function initSock() {
    socket = io();
    socket.on('connect', () => { if(myId) socket.emit('register-orey-id', { oreyId: myId, userName: getUsername() }); });

    socket.on('waiting-for-match', () => { $('waitIndicator').classList.add('on'); $('randomBtn').disabled = true; });
    socket.on('random-cancelled', () => { $('waitIndicator').classList.remove('on'); $('randomBtn').disabled = false; });

    socket.on('room-joined', async ({ roomId: r, peers }) => {
        roomId = r; 
        $('waitIndicator').classList.remove('on');
        await startLocal();
        showScreen('call-screen');
        if (peers.length) {
            const p = peers[0];
            peerId = p.socketId;
            updatePeerUI(p.userName);
            await mkOffer(p.socketId);
        }
    });

    socket.on('user-joined', ({ socketId, userName }) => {
        peerId = socketId;
        updatePeerUI(userName);
        $('remotePlaceholder').classList.add('on');
    });

    socket.on('offer', async ({ offer, fromId, fromName }) => {
        peerId = fromId;
        updatePeerUI(fromName);
        await handleOffer(offer, fromId);
    });

    socket.on('answer', async ({ answer }) => { if(pc) await pc.setRemoteDescription(new RTCSessionDescription(answer)); });
    socket.on('ice-candidate', async ({ candidate }) => { if(pc) await pc.addIceCandidate(new RTCIceCandidate(candidate)); });
    socket.on('peer-media-state', ({ videoEnabled: v }) => { $('remotePlaceholder').classList.toggle('on', !v); });
    socket.on('user-left', () => { toast('User left the call'); cleanup(); showScreen('lobby-screen'); });
    socket.on('orey-id-not-found', () => setSt('ID not found or expired'));
}

async function startLocal() {
    if (localStream) return;
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        $('localVideo').srcObject = localStream;
    } catch { toast('Camera/Mic permission denied'); }
}

function mkPC(tid) {
    const p = new RTCPeerConnection(ICE);
    localStream?.getTracks().forEach(t => p.addTrack(t, localStream));
    p.onicecandidate = ({ candidate }) => candidate && socket.emit('ice-candidate', { targetId: tid, candidate });
    p.ontrack = ({ streams }) => {
        $('remoteVideo').srcObject = streams[0];
        $('remotePlaceholder').classList.remove('on');
        startTimer();
    };
    pc = p; return p;
}

async function mkOffer(tid) {
    const p = mkPC(tid);
    const o = await p.createOffer();
    await p.setLocalDescription(o);
    socket.emit('offer', { targetId: tid, offer: o });
}

async function handleOffer(offer, fid) {
    const p = mkPC(fid);
    await p.setRemoteDescription(new RTCSessionDescription(offer));
    const a = await p.createAnswer();
    await p.setLocalDescription(a);
    socket.emit('answer', { targetId: fid, answer: a });
}

function joinRandom() {
    socket.emit('register-orey-id', { oreyId: myId, userName: getUsername() });
    socket.emit('join-random');
}

async function connectById() {
    const t = $('targetOreyId').value.trim();
    if (!t) return;
    socket.emit('register-orey-id', { oreyId: myId, userName: getUsername() });
    await startLocal();
    showScreen('call-screen');
    socket.emit('connect-by-orey-id', { targetOreyId: t });
}

function toggleMic() {
    audioOn = !audioOn;
    localStream?.getAudioTracks().forEach(t => t.enabled = audioOn);
    $('micBtn').classList.toggle('off', !audioOn);
}

function toggleCam() {
    videoOn = !videoOn;
    localStream?.getVideoTracks().forEach(t => t.enabled = videoOn);
    $('camBtn').classList.toggle('off', !videoOn);
    socket.emit('media-state', { roomId, videoEnabled: videoOn });
}

function endCall() {
    cleanup();
    socket.emit('leave-room', { roomId });
    showScreen('lobby-screen');
}

function cleanup() {
    pc?.close(); pc = null;
    localStream?.getTracks().forEach(t => t.stop()); localStream = null;
    clearInterval(timerIv); timerIv = null; t0 = null;
    $('callTimer').textContent = '00:00';
    $('remoteVideo').srcObject = null;
    $('localVideo').srcObject = null;
    $('randomBtn').disabled = false;
    $('waitIndicator').classList.remove('on');
}

function startTimer() {
    if (t0) return; t0 = Date.now();
    timerIv = setInterval(() => {
        const s = Math.floor((Date.now() - t0) / 1000);
        $('callTimer').textContent = `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
    }, 1000);
}

function updatePeerUI(name) {
    $('remoteUserName').textContent = name;
    $('placeholderName').textContent = name;
    $('bigAv').textContent = (name || '?')[0].toUpperCase();
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    $(id).classList.add('active');
}

function toast(msg) {
    const t = $('toast'); t.textContent = msg; t.classList.add('on');
    setTimeout(() => t.classList.remove('on'), 3000);
}

function setSt(msg) { $('lobStatus').textContent = msg; setTimeout(() => $('lobStatus').textContent = '', 3000); }

function copyMyId() {
    if(!myId) return;
    const el = document.createElement('textarea');
    el.value = myId;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    toast('ID Copied!');
}
</script>
</body>
</html>
