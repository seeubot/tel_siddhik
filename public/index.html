<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexCall — Video Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c10;
      --surface: #0d1117;
      --surface2: #161b22;
      --border: #21262d;
      --accent: #00e5ff;
      --accent2: #7c3aed;
      --danger: #ff4757;
      --success: #00c471;
      --text: #e6edf3;
      --muted: #8b949e;
      --radius: 12px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; overflow: hidden; }

    /* ── LOBBY ─────────────────────────────────────────────── */
    #lobby {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      position: relative;
      overflow: hidden;
    }

    #lobby::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 30% 20%, rgba(0,229,255,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 40% 60% at 80% 70%, rgba(124,58,237,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .lobby-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 52px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 0 80px rgba(0,229,255,0.05), 0 24px 60px rgba(0,0,0,0.5);
    }

    .logo {
      font-size: 13px;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.3em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .lobby-title {
      font-size: 42px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .lobby-sub {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 36px;
    }

    label {
      display: block;
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 20px;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,255,0.12);
    }

    input[type="text"]::placeholder { color: #3d444d; }

    .btn-group { display: flex; gap: 10px; margin-top: 4px; }

    .btn {
      flex: 1;
      padding: 13px 20px;
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
    }
    .btn-primary:hover { background: #33ecff; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,229,255,0.3); }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: var(--muted);
      font-size: 12px;
      font-family: 'Space Mono', monospace;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    #join-room-section { display: none; }
    #join-room-section.visible { display: block; }

    /* ── ROOM ──────────────────────────────────────────────── */
    #room {
      display: none;
      height: 100vh;
      flex-direction: column;
      background: var(--bg);
    }
    #room.active { display: flex; }

    /* Header */
    .room-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .room-logo { font-size: 13px; font-family: 'Space Mono', monospace; color: var(--accent); letter-spacing: 0.2em; }

    .room-id-badge {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 12px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .room-id-badge:hover { border-color: var(--accent); color: var(--accent); }
    .room-id-badge span { color: var(--text); }

    .header-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* Main layout */
    .room-body {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Video grid */
    .video-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
      overflow: hidden;
    }

    #video-grid {
      flex: 1;
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      align-content: start;
      overflow-y: auto;
    }

    .video-tile {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      aspect-ratio: 16/9;
      transition: border-color 0.2s;
    }
    .video-tile.speaking { border-color: var(--accent); box-shadow: 0 0 16px rgba(0,229,255,0.2); }

    .video-tile video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scaleX(-1);
    }

    .tile-label {
      position: absolute;
      bottom: 10px;
      left: 10px;
      font-size: 12px;
      font-weight: 700;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      border-radius: 6px;
      padding: 4px 10px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
    }

    .tile-icons {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 5px;
    }

    .tile-icon {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: rgba(255,71,87,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
    }
    .tile-icon.hidden { display: none; }

    .video-avatar {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--surface2), var(--surface));
      font-size: 40px;
      font-weight: 800;
      color: var(--accent);
    }

    /* Controls bar */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px 0 4px;
      flex-shrink: 0;
    }

    .ctrl-btn {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.2s;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
    }
    .ctrl-btn:hover { transform: scale(1.1); border-color: var(--muted); }
    .ctrl-btn.active { background: var(--surface); border-color: var(--accent); color: var(--accent); }
    .ctrl-btn.off { background: rgba(255,71,87,0.15); border-color: var(--danger); color: var(--danger); }
    .ctrl-btn.leave { background: var(--danger); border-color: var(--danger); color: #fff; width: 56px; height: 56px; font-size: 22px; }
    .ctrl-btn.leave:hover { background: #ff6b6b; transform: scale(1.1); }

    /* Sidebar / Chat */
    .sidebar {
      width: 300px;
      display: flex;
      flex-direction: column;
      border-left: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      transition: width 0.3s ease;
    }
    .sidebar.hidden { width: 0; overflow: hidden; }

    .sidebar-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tab-btn {
      flex: 1;
      padding: 14px;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .tab-panel.active { display: flex; }

    /* Chat */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .chat-msg {
      max-width: 100%;
    }
    .msg-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .msg-name {
      font-size: 11px;
      font-weight: 700;
      font-family: 'Space Mono', monospace;
      color: var(--accent);
    }
    .msg-time {
      font-size: 10px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
    }
    .msg-text {
      font-size: 14px;
      color: var(--text);
      background: var(--surface2);
      border-radius: 8px;
      padding: 8px 12px;
      line-height: 1.5;
      border: 1px solid var(--border);
    }
    .chat-msg.own .msg-name { color: var(--accent2); }
    .chat-msg.own .msg-text { background: rgba(124,58,237,0.12); border-color: rgba(124,58,237,0.3); }

    .chat-input-row {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chat-input-row input {
      flex: 1;
      margin: 0;
      padding: 10px 14px;
      font-size: 13px;
    }

    .send-btn {
      width: 40px; height: 40px;
      border-radius: 8px;
      background: var(--accent);
      border: none;
      color: #000;
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .send-btn:hover { background: #33ecff; transform: scale(1.05); }

    /* Participants */
    #participants-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .participant-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
    }
    .p-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      color: #000;
      flex-shrink: 0;
    }
    .p-name { font-size: 14px; font-weight: 600; }
    .p-you { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; margin-left: auto; }

    /* System messages */
    .sys-msg {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      padding: 4px;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 20px;
      font-size: 13px;
      font-family: 'Space Mono', monospace;
      transition: transform 0.3s ease;
      z-index: 1000;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* Scroll */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<!-- ═══ LOBBY ════════════════════════════════════ -->
<div id="lobby">
  <div class="grid-bg"></div>
  <div class="lobby-card">
    <div class="logo">NexCall</div>
    <div class="lobby-title">Video Chat</div>
    <div class="lobby-sub">Crystal-clear calls, zero friction.</div>

    <label for="user-name">Your Name</label>
    <input type="text" id="user-name" placeholder="Enter your name…" maxlength="24" />

    <div class="btn-group">
      <button class="btn btn-primary" onclick="createRoom()">＋ New Room</button>
    </div>

    <div class="divider">or join existing</div>

    <div id="join-room-section">
      <label for="room-id-input">Room ID</label>
      <input type="text" id="room-id-input" placeholder="Enter 8-character room ID…" maxlength="8" style="text-transform:uppercase;" />
      <div class="btn-group">
        <button class="btn btn-secondary" onclick="joinRoom()">Join Room</button>
        <button class="btn btn-secondary" style="flex:0;padding:13px 16px;" onclick="toggleJoinSection()">✕</button>
      </div>
    </div>

    <div id="join-room-section" style="display:block;" class="btn-group" id="show-join-btn-wrap">
      <!-- show/hide handled by JS -->
    </div>

    <div id="lobby-btns" class="btn-group" style="margin-top:0;">
      <button class="btn btn-secondary" onclick="showJoinSection()">→ Join Room</button>
    </div>
  </div>
</div>

<!-- ═══ ROOM ═════════════════════════════════════ -->
<div id="room">
  <div class="room-header">
    <div class="room-logo">NEXCALL</div>
    <div class="room-id-badge" onclick="copyRoomId()" title="Click to copy">
      Room: <span id="room-id-display">—</span>
    </div>
    <div class="header-status">
      <div class="status-dot"></div>
      <span id="participant-count">1 participant</span>
    </div>
  </div>

  <div class="room-body">
    <div class="video-area">
      <div id="video-grid"></div>
      <div class="controls">
        <button class="ctrl-btn active" id="mic-btn" onclick="toggleAudio()" title="Mute/Unmute">🎙️</button>
        <button class="ctrl-btn active" id="cam-btn" onclick="toggleVideo()" title="Camera on/off">📷</button>
        <button class="ctrl-btn" id="screen-btn" onclick="toggleScreen()" title="Share screen">🖥️</button>
        <button class="ctrl-btn leave" onclick="leaveRoom()" title="Leave call">📵</button>
        <button class="ctrl-btn" id="chat-toggle-btn" onclick="toggleSidebar()" title="Chat">💬</button>
      </div>
    </div>

    <div class="sidebar" id="sidebar">
      <div class="sidebar-tabs">
        <button class="tab-btn active" onclick="switchTab('chat')">Chat</button>
        <button class="tab-btn" onclick="switchTab('participants')">People</button>
      </div>
      <div class="tab-panel active" id="tab-chat">
        <div id="chat-messages"></div>
        <div class="chat-input-row">
          <input type="text" id="chat-input" placeholder="Message…" onkeydown="if(event.key==='Enter') sendChat()" />
          <button class="send-btn" onclick="sendChat()">➤</button>
        </div>
      </div>
      <div class="tab-panel" id="tab-participants">
        <div id="participants-list"></div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- Socket.IO -->
<script src="/socket.io/socket.io.js"></script>

<script>
// ── State ──────────────────────────────────────────────────
const socket = io();
let localStream = null;
let screenStream = null;
let currentRoomId = null;
let myName = '';
let audioEnabled = true;
let videoEnabled = true;
let screenSharing = false;
const peers = new Map(); // socketId → RTCPeerConnection
const peerNames = new Map(); // socketId → name
const participants = new Map(); // socketId → {name, audioEnabled, videoEnabled}

const ICE_SERVERS = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
  ]
};

// ── Lobby ──────────────────────────────────────────────────
let joinSectionVisible = false;

function showJoinSection() {
  document.getElementById('join-room-section').classList.add('visible');
  document.getElementById('lobby-btns').style.display = 'none';
  joinSectionVisible = true;
}

function toggleJoinSection() {
  document.getElementById('join-room-section').classList.remove('visible');
  document.getElementById('lobby-btns').style.display = 'flex';
  joinSectionVisible = false;
}

async function createRoom() {
  const name = document.getElementById('user-name').value.trim();
  if (!name) { showToast('Please enter your name'); return; }
  const res = await fetch('/create-room');
  const { roomId } = await res.json();
  await startCall(roomId, name);
}

async function joinRoom() {
  const name = document.getElementById('user-name').value.trim();
  const roomId = document.getElementById('room-id-input').value.trim().toUpperCase();
  if (!name) { showToast('Please enter your name'); return; }
  if (!roomId || roomId.length !== 8) { showToast('Invalid room ID'); return; }
  await startCall(roomId, name);
}

async function startCall(roomId, name) {
  myName = name;
  currentRoomId = roomId;
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  } catch (e) {
    showToast('Camera/mic permission denied');
    return;
  }
  // Show room
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('room').classList.add('active');
  document.getElementById('room-id-display').textContent = roomId;
  addVideoTile(socket.id, name, localStream, true);
  addParticipant(socket.id, name, true);
  socket.emit('join-room', { roomId, userName: name });
}

// ── Socket events ──────────────────────────────────────────
socket.on('room-joined', async ({ roomId, peers: existingPeers }) => {
  for (const { socketId, userName } of existingPeers) {
    peerNames.set(socketId, userName);
    addParticipant(socketId, userName);
    const pc = createPeerConnection(socketId, userName);
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit('offer', { targetId: socketId, offer });
  }
  updateParticipantCount();
});

socket.on('user-joined', async ({ socketId, userName }) => {
  peerNames.set(socketId, userName);
  addParticipant(socketId, userName);
  addSysMessage(`${userName} joined`);
  updateParticipantCount();
});

socket.on('offer', async ({ offer, fromId, fromName }) => {
  peerNames.set(fromId, fromName);
  const pc = createPeerConnection(fromId, fromName);
  await pc.setRemoteDescription(offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  socket.emit('answer', { targetId: fromId, answer });
});

socket.on('answer', async ({ answer, fromId }) => {
  const pc = peers.get(fromId);
  if (pc) await pc.setRemoteDescription(answer);
});

socket.on('ice-candidate', async ({ candidate, fromId }) => {
  const pc = peers.get(fromId);
  if (pc && candidate) await pc.addIceCandidate(candidate);
});

socket.on('user-left', ({ socketId, userName }) => {
  removeVideoTile(socketId);
  removeParticipant(socketId);
  closePeer(socketId);
  addSysMessage(`${userName || 'Someone'} left`);
  updateParticipantCount();
});

socket.on('peer-media-state', ({ socketId, audioEnabled, videoEnabled }) => {
  const p = participants.get(socketId);
  if (p) { p.audioEnabled = audioEnabled; p.videoEnabled = videoEnabled; }
  const muteIcon = document.getElementById(`mute-icon-${socketId}`);
  const camIcon = document.getElementById(`cam-icon-${socketId}`);
  if (muteIcon) muteIcon.classList.toggle('hidden', audioEnabled);
  if (camIcon) camIcon.classList.toggle('hidden', videoEnabled);
});

socket.on('chat-message', ({ socketId, userName, message, timestamp }) => {
  appendChat(socketId, userName, message, timestamp, socketId === socket.id);
});

socket.on('room-full', () => { showToast('Room is full (max 10)'); });

// ── WebRTC ─────────────────────────────────────────────────
function createPeerConnection(socketId, userName) {
  const pc = new RTCPeerConnection(ICE_SERVERS);
  peers.set(socketId, pc);

  localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

  pc.onicecandidate = ({ candidate }) => {
    if (candidate) socket.emit('ice-candidate', { targetId: socketId, candidate });
  };

  pc.ontrack = ({ streams: [stream] }) => {
    const existing = document.getElementById(`video-${socketId}`);
    if (existing) { existing.srcObject = stream; return; }
    addVideoTile(socketId, userName, stream, false);
  };

  pc.onconnectionstatechange = () => {
    if (['disconnected', 'failed', 'closed'].includes(pc.connectionState)) {
      removeVideoTile(socketId);
      removeParticipant(socketId);
      closePeer(socketId);
      updateParticipantCount();
    }
  };

  return pc;
}

function closePeer(socketId) {
  const pc = peers.get(socketId);
  if (pc) { pc.close(); peers.delete(socketId); }
  peerNames.delete(socketId);
}

// ── Video tiles ────────────────────────────────────────────
function addVideoTile(socketId, name, stream, isLocal) {
  const grid = document.getElementById('video-grid');
  const tile = document.createElement('div');
  tile.className = 'video-tile';
  tile.id = `tile-${socketId}`;

  const initial = (name[0] || '?').toUpperCase();

  tile.innerHTML = `
    <div class="video-avatar" id="avatar-${socketId}">${initial}</div>
    <video id="video-${socketId}" autoplay ${isLocal ? 'muted' : ''} playsinline></video>
    <div class="tile-label">${name}${isLocal ? ' (You)' : ''}</div>
    <div class="tile-icons">
      <div class="tile-icon hidden" id="mute-icon-${socketId}">🔇</div>
      <div class="tile-icon hidden" id="cam-icon-${socketId}">📵</div>
    </div>`;

  grid.appendChild(tile);
  const video = document.getElementById(`video-${socketId}`);
  video.srcObject = stream;
}

function removeVideoTile(socketId) {
  const tile = document.getElementById(`tile-${socketId}`);
  if (tile) tile.remove();
}

// ── Controls ───────────────────────────────────────────────
function toggleAudio() {
  if (!localStream) return;
  audioEnabled = !audioEnabled;
  localStream.getAudioTracks().forEach(t => t.enabled = audioEnabled);
  const btn = document.getElementById('mic-btn');
  btn.textContent = audioEnabled ? '🎙️' : '🔇';
  btn.className = `ctrl-btn ${audioEnabled ? 'active' : 'off'}`;
  document.getElementById(`mute-icon-${socket.id}`)?.classList.toggle('hidden', audioEnabled);
  socket.emit('media-state', { roomId: currentRoomId, audioEnabled, videoEnabled });
}

function toggleVideo() {
  if (!localStream) return;
  videoEnabled = !videoEnabled;
  localStream.getVideoTracks().forEach(t => t.enabled = videoEnabled);
  const btn = document.getElementById('cam-btn');
  btn.textContent = videoEnabled ? '📷' : '📵';
  btn.className = `ctrl-btn ${videoEnabled ? 'active' : 'off'}`;
  const avatar = document.getElementById(`avatar-${socket.id}`);
  if (avatar) avatar.style.display = videoEnabled ? 'none' : 'flex';
  document.getElementById(`cam-icon-${socket.id}`)?.classList.toggle('hidden', videoEnabled);
  socket.emit('media-state', { roomId: currentRoomId, audioEnabled, videoEnabled });
}

async function toggleScreen() {
  const btn = document.getElementById('screen-btn');
  if (!screenSharing) {
    try {
      screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });
      const screenTrack = screenStream.getVideoTracks()[0];
      peers.forEach(pc => {
        const sender = pc.getSenders().find(s => s.track?.kind === 'video');
        if (sender) sender.replaceTrack(screenTrack);
      });
      const localVideo = document.getElementById(`video-${socket.id}`);
      if (localVideo) localVideo.srcObject = screenStream;
      screenSharing = true;
      btn.textContent = '🖥️';
      btn.className = 'ctrl-btn off';
      screenTrack.onended = () => stopScreen();
    } catch { showToast('Screen share cancelled'); }
  } else {
    stopScreen();
  }
}

function stopScreen() {
  if (!screenStream) return;
  screenStream.getTracks().forEach(t => t.stop());
  const camTrack = localStream.getVideoTracks()[0];
  peers.forEach(pc => {
    const sender = pc.getSenders().find(s => s.track?.kind === 'video');
    if (sender && camTrack) sender.replaceTrack(camTrack);
  });
  const localVideo = document.getElementById(`video-${socket.id}`);
  if (localVideo) localVideo.srcObject = localStream;
  screenSharing = false;
  document.getElementById('screen-btn').textContent = '🖥️';
  document.getElementById('screen-btn').className = 'ctrl-btn';
  screenStream = null;
}

function leaveRoom() {
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  if (screenStream) screenStream.getTracks().forEach(t => t.stop());
  peers.forEach((_, id) => closePeer(id));
  socket.disconnect();
  location.reload();
}

// ── Chat ───────────────────────────────────────────────────
function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg) return;
  socket.emit('chat-message', { roomId: currentRoomId, message: msg });
  input.value = '';
}

function appendChat(socketId, name, message, timestamp, isOwn) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `chat-msg${isOwn ? ' own' : ''}`;
  const time = new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  div.innerHTML = `
    <div class="msg-meta">
      <span class="msg-name">${name}</span>
      <span class="msg-time">${time}</span>
    </div>
    <div class="msg-text">${escapeHtml(message)}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function addSysMessage(text) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'sys-msg';
  div.textContent = `— ${text} —`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ── Participants ───────────────────────────────────────────
function addParticipant(socketId, name, isYou = false) {
  participants.set(socketId, { name, audioEnabled: true, videoEnabled: true });
  renderParticipants();
}

function removeParticipant(socketId) {
  participants.delete(socketId);
  renderParticipants();
}

function renderParticipants() {
  const list = document.getElementById('participants-list');
  list.innerHTML = '';
  participants.forEach(({ name }, id) => {
    const isYou = id === socket.id;
    const row = document.createElement('div');
    row.className = 'participant-row';
    row.innerHTML = `
      <div class="p-avatar">${(name[0] || '?').toUpperCase()}</div>
      <div class="p-name">${name}</div>
      ${isYou ? '<div class="p-you">You</div>' : ''}`;
    list.appendChild(row);
  });
  updateParticipantCount();
}

function updateParticipantCount() {
  const count = participants.size;
  document.getElementById('participant-count').textContent =
    `${count} participant${count !== 1 ? 's' : ''}`;
}

// ── UI helpers ─────────────────────────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('hidden');
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', ['chat','participants'][i] === tab));
  document.getElementById('tab-chat').classList.toggle('active', tab === 'chat');
  document.getElementById('tab-participants').classList.toggle('active', tab === 'participants');
}

function copyRoomId() {
  navigator.clipboard.writeText(currentRoomId).then(() => showToast(`Room ID copied: ${currentRoomId}`));
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Init: check and hide video avatars ─────────────────────
document.addEventListener('DOMContentLoaded', () => {
  const nameInput = document.getElementById('user-name');
  nameInput.focus();
});

// Watch local video track to show/hide avatar
setInterval(() => {
  if (!localStream) return;
  const track = localStream.getVideoTracks()[0];
  const avatar = document.getElementById(`avatar-${socket.id}`);
  if (!avatar) return;
  avatar.style.display = (track && track.enabled) ? 'none' : 'flex';
}, 500);
</script>
</body>
