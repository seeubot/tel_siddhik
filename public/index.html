  </style>

<body>
  <div class="bg-gradient"></div>

  <!-- LOBBY -->
  <div id="lobby">
    <div class="lobby-container">
      <div class="brand">
        <h1>NexCall</h1>
        <p>Real-time encrypted video chat</p>
      </div>
      
      <div class="input-group">
        <label>Display Name</label>
        <input type="text" id="user-name" placeholder="How should we call you?" autocomplete="off" />
      </div>

      <button class="btn btn-primary" onclick="createRoom()">
        <span id="btn-text">Start New Chat</span>
      </button>

      <div class="divider">OR JOIN EXISTING</div>

      <div class="input-group">
        <label>Room Code</label>
        <input type="text" id="room-id-input" placeholder="Enter 8-digit code" maxlength="8" style="text-transform:uppercase" />
      </div>

      <button class="btn btn-secondary" onclick="joinRoom()">Join Room</button>
    </div>
  </div>

  <!-- ROOM -->
  <div id="room">
    <div class="viewport">
      <video id="stranger-video" autoplay playsinline></video>
      
      <!-- Waiting state -->
      <div id="waiting-view">
        <div class="loader"></div>
        <p style="color: var(--text-muted); font-weight: 500">Searching for connections...</p>
      </div>

      <div class="overlay-ui">
        <div class="top-bar">
          <div class="badge" id="room-id-badge" onclick="copyRoomId()">
            <span style="opacity: 0.6">Room:</span> <span id="display-room-id">...</span>
          </div>
          <div class="badge">
            <div class="dot" id="status-dot"></div>
            <span id="status-text">Disconnected</span>
          </div>
        </div>

        <div id="local-wrap">
          <video id="local-video" autoplay muted playsinline></video>
        </div>

        <div class="bottom-controls">
          <button class="round-btn" id="mic-btn" onclick="toggleAudio()">🎙️</button>
          <button class="round-btn danger" onclick="leaveRoom()">📵</button>
          <button class="round-btn" id="cam-btn" onclick="toggleVideo()">📷</button>
          <button class="round-btn chat-toggle" onclick="toggleSidebar()">💬</button>
        </div>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div style="padding: 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center">
        <h2 style="font-size: 1.1rem">Live Chat</h2>
        <button class="round-btn chat-toggle" style="width: 32px; height: 32px; font-size: 0.8rem" onclick="toggleSidebar()">✕</button>
      </div>
      <div id="messages"></div>
      <div class="chat-input-container">
        <input type="text" id="chat-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendChat()" />
        <button class="btn btn-primary" style="width: auto; padding: 0 20px" onclick="sendChat()">Send</button>
      </div>
    </div>
  </div>

  <div id="toast">Copied to clipboard!</div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let localStream = null, currentRoomId = null, myName = '', strangerId = null;
    let audioEnabled = true, videoEnabled = true, pc = null;

    const ICE = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    async function createRoom() {
      const name = document.getElementById('user-name').value.trim();
      if (!name) return triggerToast('Please enter a name');
      const res = await fetch('/create-room');
      const { roomId } = await res.json();
      enterRoom(roomId, name);
    }

    async function joinRoom() {
      const name = document.getElementById('user-name').value.trim();
      const roomId = document.getElementById('room-id-input').value.trim().toUpperCase();
      if (!name || roomId.length !== 8) return triggerToast('Invalid name or room ID');
      enterRoom(roomId, name);
    }

    async function enterRoom(roomId, name) {
      myName = name;
      currentRoomId = roomId;
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('local-video').srcObject = localStream;
        document.getElementById('lobby').style.display = 'none';
        document.getElementById('room').classList.add('active');
        document.getElementById('display-room-id').textContent = roomId;
        socket.emit('join-room', { roomId, userName: name });
      } catch (e) {
        triggerToast('Camera access required');
      }
    }

    // WebRTC & Socket Handlers
    socket.on('room-joined', async ({ peers }) => {
      if (peers.length > 0) {
        strangerId = peers[0].socketId;
        setupPeer(strangerId, true);
      }
    });

    socket.on('user-joined', ({ socketId }) => {
      strangerId = socketId;
      setupPeer(socketId, false);
      triggerToast('Someone joined the room');
    });

    socket.on('offer', async ({ offer, fromId }) => {
      strangerId = fromId;
      const peerConn = getOrCreatePC(fromId);
      await peerConn.setRemoteDescription(offer);
      const answer = await peerConn.createAnswer();
      await peerConn.setLocalDescription(answer);
      socket.emit('answer', { targetId: fromId, answer });
    });

    socket.on('answer', async ({ answer }) => pc && await pc.setRemoteDescription(answer));
    socket.on('ice-candidate', async ({ candidate }) => pc && await pc.addIceCandidate(candidate));

    socket.on('user-left', () => {
      document.getElementById('waiting-view').style.display = 'flex';
      document.getElementById('status-dot').className = 'dot';
      document.getElementById('status-text').textContent = 'Disconnected';
      if(pc) pc.close();
      pc = null;
    });

    socket.on('chat-message', ({ socketId, userName, message }) => {
      appendMsg(userName, message, socketId === socket.id);
    });

    function getOrCreatePC(targetId) {
      if (pc) return pc;
      pc = new RTCPeerConnection(ICE);
      localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
      pc.onicecandidate = ({ candidate }) => candidate && socket.emit('ice-candidate', { targetId, candidate });
      pc.ontrack = ({ streams: [stream] }) => {
        document.getElementById('stranger-video').srcObject = stream;
        document.getElementById('waiting-view').style.display = 'none';
        document.getElementById('status-dot').className = 'dot active';
        document.getElementById('status-text').textContent = 'Live';
      };
      return pc;
    }

    async function setupPeer(targetId, isInitiator) {
      const peerConn = getOrCreatePC(targetId);
      if (isInitiator) {
        const offer = await peerConn.createOffer();
        await peerConn.setLocalDescription(offer);
        socket.emit('offer', { targetId, offer });
      }
    }

    // UI Helpers
    function toggleAudio() {
      audioEnabled = !audioEnabled;
      localStream.getAudioTracks().forEach(t => t.enabled = audioEnabled);
      const btn = document.getElementById('mic-btn');
      btn.textContent = audioEnabled ? '🎙️' : '🔇';
      btn.classList.toggle('muted', !audioEnabled);
    }

    function toggleVideo() {
      videoEnabled = !videoEnabled;
      localStream.getVideoTracks().forEach(t => t.enabled = videoEnabled);
      const btn = document.getElementById('cam-btn');
      btn.textContent = videoEnabled ? '📷' : '📵';
      btn.classList.toggle('muted', !videoEnabled);
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    function sendChat() {
      const input = document.getElementById('chat-input');
      if (!input.value.trim()) return;
      socket.emit('chat-message', { roomId: currentRoomId, message: input.value });
      input.value = '';
    }

    function appendMsg(name, text, isMine) {
      const box = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = `message ${isMine ? 'mine' : 'theirs'}`;
      div.textContent = text;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    function triggerToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function copyRoomId() {
      const el = document.createElement('textarea');
      el.value = currentRoomId;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      triggerToast('Room Code Copied!');
    }

    function leaveRoom() {
      location.reload();
    }
  </script>
</body>
</html>
