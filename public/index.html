<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Orey | Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Instrument+Sans:wght@400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #080810;
  --s1: #0f0f1a;
  --s2: #14141f;
  --border: rgba(255,255,255,0.06);
  --border-hi: rgba(255,255,255,0.14);
  --amber: #f5a623;
  --amber-dim: rgba(245,166,35,0.12);
  --amber-glow: rgba(245,166,35,0.32);
  --ice: #a8d8ea;
  --text: #f2f2f8;
  --muted: rgba(242,242,248,0.42);
  --faint: rgba(242,242,248,0.18);
  --glass: rgba(10,10,20,0.72);
  --glass-light: rgba(255,255,255,0.06);
  --red: #ff4f4f;
  --green: #4fcc8a;
  --font-d: 'Clash Display', sans-serif;
  --font-b: 'Instrument Sans', sans-serif;
  --font-m: 'DM Mono', monospace;
  --sb: env(safe-area-inset-bottom, 0px);
  --st: env(safe-area-inset-top, 0px);
}

html, body {
  height: 100%; width: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-b);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

.screen { display: none; position: fixed; inset: 0; }
.screen.active { display: flex; }

/* LOBBY */
#lobby {
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding: 0 1.25rem calc(3rem + var(--sb)) 1.25rem;
}

.ambient { position: absolute; inset: 0; pointer-events: none; }
.ab { position: absolute; border-radius: 50%; filter: blur(110px); opacity: 0.4; }
.ab1 { width: 80vw; height: 80vw; background: radial-gradient(circle,rgba(245,166,35,.2) 0%,transparent 70%); top: -20vw; left: -15vw; }
.ab2 { width: 65vw; height: 65vw; background: radial-gradient(circle,rgba(168,216,234,.13) 0%,transparent 70%); bottom: 5vw; right: -20vw; }

.wordmark {
  position: absolute; top: calc(3rem + var(--st)); text-align: center;
}
.wordmark h1 {
  font-family: var(--font-d); font-size: 4rem; font-weight: 700;
  background: linear-gradient(135deg, var(--amber) 10%, #ffd080 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.panel { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 1.2rem; z-index: 10; }

.lbl { font-size: .65rem; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); margin-bottom: .4rem; }

input[type="text"] {
  width: 100%; background: var(--s2); border: 1px solid var(--border);
  border-radius: 14px; padding: .9rem 1.2rem; color: var(--text);
  font-family: var(--font-b); font-size: 1rem; outline: none; transition: 0.2s;
}
input:focus { border-color: var(--amber); box-shadow: 0 0 0 3px var(--amber-dim); }

.id-card {
  background: var(--s2); border: 1px solid var(--border);
  border-radius: 14px; padding: .8rem 1rem;
  display: flex; align-items: center; gap: .8rem;
}
.id-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--amber); box-shadow: 0 0 8px var(--amber-glow); }
.id-val { font-family: var(--font-m); color: var(--amber); font-size: 0.9rem; flex: 1; }

.btn-rand {
  width: 100%; padding: 1.1rem; background: var(--amber); color: #000;
  border: none; border-radius: 16px; font-family: var(--font-d);
  font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.2s;
}
.btn-rand:hover { transform: translateY(-2px); box-shadow: 0 10px 30px var(--amber-glow); }
.btn-rand:disabled { opacity: 0.5; transform: none; }

.wait-bar {
  display: none; align-items: center; justify-content: space-between;
  background: var(--amber-dim); border: 1px solid var(--border-hi);
  border-radius: 14px; padding: 1rem;
}
.wait-bar.on { display: flex; }

/* CALL SCREEN */
#call { flex-direction: column; background: #000; }
.remote-stage { position: absolute; inset: 0; background: #05050d; }
#remoteVideo { width: 100%; height: 100%; object-fit: cover; }

.remote-off {
  position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
  flex-direction: column; gap: 1rem; background: #05050d; z-index: 2;
}
.remote-off.on { display: flex; }
.big-av {
  width: 90px; height: 90px; border-radius: 50%; background: var(--amber);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-d); font-size: 2.2rem; color: #000;
}

.topbar {
  position: absolute; top: 0; left: 0; right: 0; z-index: 20;
  padding: calc(1rem + var(--st)) 1.25rem;
  display: flex; justify-content: space-between; align-items: center;
}
.pill {
  background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border);
  border-radius: 100px; padding: 0.5rem 1rem; display: flex; align-items: center; gap: 0.6rem;
}

.pip {
  position: absolute; bottom: calc(120px + var(--sb)); right: 1.25rem;
  width: 110px; height: 160px; border-radius: 20px; overflow: hidden;
  border: 2px solid rgba(255,255,255,0.1); z-index: 30; background: #111;
}
#localVideo { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

.ctrl-bar {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 40;
  padding: 1.5rem 1.5rem calc(2rem + var(--sb));
  display: flex; justify-content: center;
}
.ctrl-pill {
  background: var(--glass); backdrop-filter: blur(30px); border: 1px solid var(--border);
  border-radius: 100px; padding: 0.6rem; display: flex; align-items: center; gap: 0.5rem;
}
.c-btn {
  width: 54px; height: 54px; border-radius: 50%; border: 1px solid var(--border);
  background: var(--glass-light); color: #fff; display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: 0.2s;
}
.c-btn.off { background: rgba(255, 79, 79, 0.15); color: var(--red); border-color: rgba(255, 79, 79, 0.3); }
.c-end { background: var(--red) !important; color: #fff; width: 64px; }

/* Loading overlay for auto-reconnect */
.auto-reconnect-overlay {
  position: absolute; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px);
  z-index: 50; display: none; align-items: center; justify-content: center;
  flex-direction: column; gap: 1.5rem;
}
.auto-reconnect-overlay.on { display: flex; }
.spinner {
  width: 50px; height: 50px; border: 3px solid var(--border);
  border-top-color: var(--amber); border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* MODALS */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
  z-index: 100; display: none; align-items: flex-end; justify-content: center;
}
.overlay.on { display: flex; }
.sheet {
  width: 100%; max-width: 450px; background: var(--s1); border-radius: 30px 30px 0 0;
  padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem;
}
.sb-btn { flex: 1; padding: 1rem; border-radius: 14px; font-weight: 600; cursor: pointer; border: none; }

.toast {
  position: fixed; top: 2rem; left: 50%; transform: translateX(-50%);
  background: var(--amber); color: #000; padding: 0.7rem 1.5rem;
  border-radius: 100px; font-weight: 700; font-size: 0.85rem;
  z-index: 1000; display: none;
}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby" class="screen active">
  <div class="ambient"><div class="ab ab1"></div><div class="ab ab2"></div></div>
  <div class="wordmark"><h1>Orey</h1><p>FACE-TO-FACE WITH THE WORLD</p></div>

  <div class="panel">
    <div>
      <div class="lbl">Username</div>
      <input type="text" id="userName" placeholder="What's your name?" maxlength="20">
    </div>

    <div>
      <div class="lbl">Your Orey-ID</div>
      <div class="id-card">
        <div class="id-dot"></div>
        <div class="id-val" id="myOreyId">Generating...</div>
        <svg onclick="copyMyId()" style="cursor:pointer;opacity:0.6" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      </div>
    </div>

    <button id="randomBtn" class="btn-rand" onclick="joinRandom()">Join Random Match</button>

    <div id="waitBar" class="wait-bar">
      <span style="color:var(--amber)">Finding someone...</span>
      <button onclick="cancelRandom()" style="background:none; border:1px solid var(--amber); color:var(--amber); border-radius:8px; padding:0.4rem 0.8rem; cursor:pointer">Cancel</button>
    </div>

    <div style="display:flex; align-items:center; gap:1rem; opacity:0.3; font-size:0.7rem; letter-spacing:0.2em">
      <div style="flex:1; height:1px; background:#fff"></div>OR CONNECT BY ID<div style="flex:1; height:1px; background:#fff"></div>
    </div>

    <div style="display:flex; gap:0.5rem">
      <input type="text" id="targetOreyId" placeholder="Orey-XXXX-XXXX">
      <button onclick="connectById()" style="background:var(--s2); border:1px solid var(--border); border-radius:14px; color:#fff; padding:0 1.2rem; cursor:pointer">➔</button>
    </div>
    <div id="lobStatus" style="text-align:center; font-size:0.8rem; height:1.2em"></div>
  </div>
</div>

<!-- CALL SCREEN -->
<div id="call" class="screen">
  <div class="topbar">
    <div class="pill" onclick="endCall(false)" style="cursor:pointer">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      <span style="font-size:0.9rem; font-weight:600">Leave</span>
    </div>
    <div class="pill">
      <div style="width:6px; height:6px; background:var(--green); border-radius:50%"></div>
      <span id="callTimer" style="font-family:var(--font-m); font-size:0.8rem">00:00</span>
    </div>
    <div class="pill">
      <span id="peerNm" style="font-weight:600; font-size:0.9rem">—</span>
    </div>
  </div>

  <div class="remote-stage">
    <video id="remoteVideo" autoplay playsinline></video>
    <div id="remoteOff" class="remote-off">
      <div class="big-av" id="bigAv">?</div>
      <p id="remoteLabel" style="opacity:0.6">Waiting for video...</p>
    </div>
  </div>

  <div class="pip">
    <video id="localVideo" autoplay muted playsinline></video>
  </div>

  <div class="ctrl-bar">
    <div class="ctrl-pill">
      <button class="c-btn" id="micBtn" onclick="toggleMic()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
      <button class="c-btn" id="camBtn" onclick="toggleCam()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
      </button>
      <button class="c-btn" onclick="requestShareId()" title="Share Orey ID">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
      </button>
      <div style="width:1px; height:24px; background:var(--border)"></div>
      <button class="c-btn c-end" onclick="endCall(false)">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
  </div>

  <!-- Auto-reconnect overlay -->
  <div id="autoReconnectOverlay" class="auto-reconnect-overlay">
    <div class="spinner"></div>
    <h3 id="autoReconnectMsg" style="font-family:var(--font-d); text-align:center">Finding a new partner...</h3>
    <button onclick="cancelAutoReconnect()" style="background:var(--s2); border:1px solid var(--border); color:#fff; padding:0.7rem 1.5rem; border-radius:30px; cursor:pointer; font-size:0.9rem">Cancel</button>
  </div>
</div>

<!-- SHARE REQUEST MODAL -->
<div class="overlay" id="shareModal">
  <div class="sheet">
    <h3 style="font-family:var(--font-d); text-align:center">🤝 Share Orey-IDs?</h3>
    <p id="shareReqTxt" style="text-align:center; color:var(--muted)">Your partner wants to exchange IDs to connect later.</p>
    <div style="display:flex; gap:1rem">
      <button class="sb-btn" onclick="declineShareId()" style="background:var(--s2); color:#fff; border:1px solid var(--border)">Decline</button>
      <button class="sb-btn" onclick="acceptShareId()" style="background:var(--amber); color:#000">Accept & Share</button>
    </div>
  </div>
</div>

<!-- REVEAL MODAL -->
<div class="overlay" id="revealModal">
  <div class="sheet">
    <h3 style="font-family:var(--font-d); text-align:center">✨ IDs Exchanged</h3>
    <div style="background:var(--s2); padding:1.5rem; border-radius:20px; text-align:center">
      <div style="font-size:0.6rem; text-transform:uppercase; color:var(--muted); margin-bottom:0.5rem">Partner ID</div>
      <div id="revealedId" style="font-family:var(--font-m); color:var(--amber); font-size:1.2rem; letter-spacing:0.1em">OREY-XXXX-XXXX</div>
    </div>
    <button class="sb-btn" onclick="copyRevealedId()" style="background:var(--amber); color:#000">Copy ID</button>
    <button class="sb-btn" onclick="closeReveal()" style="background:none; color:var(--muted)">Close</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
let socket, localStream, pc;
let roomId=null, peerId=null, myId=null;
let audioOn=true, videoOn=true;
let t0=null, timerIv=null, shareFrom=null;
let isAutoReconnecting = false;

const ICE={iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]};
const $=id=>document.getElementById(id);
const un=()=>$('userName').value.trim()||'Anonymous';

window.onload=async()=>{ await genId(); initSock(); };

async function genId() {
  try {
    const d=await(await fetch('/generate-orey-id')).json();
    myId=d.oreyId;
    $('myOreyId').textContent=myId;
  } catch { $('myOreyId').textContent='Error'; }
}

function initSock() {
  socket=io();
  socket.on('connect',()=>{ if(myId) socket.emit('register-orey-id',{oreyId:myId,userName:un()}); });

  socket.on('waiting-for-match',(data)=>{
    $('waitBar').classList.add('on'); 
    $('randomBtn').style.display='none';
    if(data && data.autoReconnectMode) {
      showAutoReconnectOverlay(true, "Finding a new partner...");
    }
  });
  
  socket.on('random-cancelled',()=>{ 
    $('waitBar').classList.remove('on'); 
    $('randomBtn').style.display='';
    hideAutoReconnectOverlay();
    isAutoReconnecting = false;
  });

  socket.on('room-joined',async({roomId:r,peers, autoReconnected})=>{
    roomId=r; 
    $('waitBar').classList.remove('on');
    hideAutoReconnectOverlay();
    isAutoReconnecting = false;
    
    await startLocal(); 
    showCall();
    
    if(autoReconnected) {
      showToast("Connected with a new partner!", 2000);
    }
    
    if(peers.length){
      const p=peers[0]; peerId=p.socketId; updatePeerUI(p.userName);
      await mkOffer(p.socketId);
    }
  });

  socket.on('user-joined',({socketId,userName})=>{ peerId=socketId; updatePeerUI(userName); });
  socket.on('offer',async({offer,fromId,fromName})=>{ peerId=fromId; updatePeerUI(fromName); await handleOffer(offer,fromId); });
  socket.on('answer',async({answer})=>{ await pc?.setRemoteDescription(new RTCSessionDescription(answer)); });
  socket.on('ice-candidate',async({candidate})=>{ if(pc) await pc.addIceCandidate(new RTCIceCandidate(candidate)); });

  socket.on('peer-media-state',({videoEnabled:v})=>{ $('remoteOff').classList.toggle('on',!v); });
  
  socket.on('user-left',({autoReconnecting})=>{
    if(autoReconnecting) {
      showToast("Partner is finding a new match...");
      showAutoReconnectOverlay(true, "Partner disconnected. Finding new match...");
      cleanupCall();
    } else {
      showToast('Partner left');
      endCall(false);
    }
  });
  
  socket.on('user-disconnected',({willAutoReconnect})=>{
    if(willAutoReconnect) {
      showAutoReconnectOverlay(true, "Partner disconnected. Waiting for reconnect...");
    } else {
      showToast('Partner disconnected');
      endCall(false);
    }
  });
  
  socket.on('waiting-for-reconnect',({message})=>{
    showAutoReconnectOverlay(true, message);
  });
  
  socket.on('partner-auto-reconnecting',({message})=>{
    showToast(message);
  });
  
  socket.on('auto-reconnecting',({message, delay})=>{
    showAutoReconnectOverlay(true, message);
  });
  
  socket.on('auto-reconnect-started',({message})=>{
    showAutoReconnectOverlay(true, message);
    isAutoReconnecting = true;
  });

  socket.on('share-id-request',({fromId,fromName})=>{
    shareFrom=fromId;
    $('shareReqTxt').textContent=`${fromName} wants to swap Orey-IDs.`;
    $('shareModal').classList.add('on');
  });

  socket.on('share-id-reveal',({oreyId, userName})=>{
    $('shareModal').classList.remove('on');
    $('revealedId').textContent=oreyId;
    $('revealModal').classList.add('on');
    showToast(`You are now connected with ${userName || 'partner'}!`);
  });

  socket.on('share-id-declined',()=>showToast('They declined to share IDs'));
  socket.on('orey-id-not-found',()=>setSt('ID not found or offline','red'));
}

function showAutoReconnectOverlay(show, message) {
  const overlay = $('autoReconnectOverlay');
  const msgEl = $('autoReconnectMsg');
  if(show) {
    msgEl.textContent = message || "Finding a new partner...";
    overlay.classList.add('on');
  } else {
    overlay.classList.remove('on');
  }
}

function hideAutoReconnectOverlay() {
  $('autoReconnectOverlay').classList.remove('on');
}

function cancelAutoReconnect() {
  isAutoReconnecting = false;
  hideAutoReconnectOverlay();
  socket.emit('cancel-random');
  endCall(false);
}

async function startLocal() {
  if(localStream)return;
  try{
    localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
    $('localVideo').srcObject=localStream;
  }catch{ showToast('Camera permission denied'); }
}

function mkPC(tid) {
  const p=new RTCPeerConnection(ICE);
  localStream?.getTracks().forEach(t=>p.addTrack(t,localStream));
  p.onicecandidate=({candidate})=>candidate&&socket.emit('ice-candidate',{targetId:tid,candidate});
  p.ontrack=({streams})=>{ 
    $('remoteVideo').srcObject=streams[0]; 
    $('remoteOff').classList.remove('on'); 
    startTimer(); 
    hideAutoReconnectOverlay();
  };
  pc=p; return p;
}

async function mkOffer(tid){ const p=mkPC(tid); const o=await p.createOffer(); await p.setLocalDescription(o); socket.emit('offer',{targetId:tid,offer:o}); }
async function handleOffer(offer,fid){ const p=mkPC(fid); await p.setRemoteDescription(new RTCSessionDescription(offer)); const a=await p.createAnswer(); await p.setLocalDescription(a); socket.emit('answer',{targetId:fid,answer:a}); }

function joinRandom(){ 
  socket.emit('register-orey-id',{oreyId:myId,userName:un()}); 
  socket.emit('join-random'); 
}

function cancelRandom(){ 
  socket.emit('cancel-random'); 
  hideAutoReconnectOverlay();
}

async function connectById(){
  const t=$('targetOreyId').value.trim(); if(!t)return;
  socket.emit('register-orey-id',{oreyId:myId,userName:un()});
  await startLocal(); showCall();
  socket.emit('connect-by-orey-id', {targetOreyId:t});
}

function toggleMic(){ audioOn=!audioOn; localStream?.getAudioTracks().forEach(t=>t.enabled=audioOn); $('micBtn').classList.toggle('off',!audioOn); }
function toggleCam(){ 
    videoOn=!videoOn; 
    localStream?.getVideoTracks().forEach(t=>t.enabled=videoOn); 
    $('camBtn').classList.toggle('off',!videoOn); 
    socket.emit('media-state',{roomId, audioEnabled:audioOn, videoEnabled:videoOn});
}

function requestShareId(){ socket.emit('share-id-request',{roomId}); showToast('Request sent'); }
function acceptShareId(){ $('shareModal').classList.remove('on'); socket.emit('share-id-accept',{roomId, targetId:shareFrom}); }
function declineShareId(){ $('shareModal').classList.remove('on'); socket.emit('share-id-decline',{roomId}); }

function endCall(autoReconnect = false){
  cleanupCall();
  
  if(autoReconnect && roomId) {
    // User wants to auto-reconnect after leaving
    socket.emit('leave-chat', { roomId, willAutoReconnect: true });
    isAutoReconnecting = true;
    showAutoReconnectOverlay(true, "Finding a new partner...");
  } else {
    // Normal leave - go back to lobby
    if(roomId) {
      socket.emit('leave-chat', { roomId, willAutoReconnect: false });
    }
    showScreen('lobby');
    isAutoReconnecting = false;
    hideAutoReconnectOverlay();
  }
  
  roomId = null;
  peerId = null;
}

function cleanupCall() {
  pc?.close(); 
  pc = null;
  
  if(localStream) {
    localStream.getTracks().forEach(t=>t.stop());
    localStream = null;
  }
  
  clearInterval(timerIv); 
  timerIv = null; 
  t0 = null;
  
  const remoteVideo = $('remoteVideo');
  if(remoteVideo.srcObject) {
    remoteVideo.srcObject.getTracks().forEach(track => track.stop());
    remoteVideo.srcObject = null;
  }
}

function startTimer(){
  if(t0)return; t0=Date.now();
  timerIv=setInterval(()=>{
    const s=Math.floor((Date.now()-t0)/1000);
    $('callTimer').textContent=`${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
  },1000);
}

function updatePeerUI(name){
  $('peerNm').textContent=name || 'Anonymous';
  $('bigAv').textContent=(name||'?')[0].toUpperCase();
}

function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); $(id).classList.add('active'); }
function showCall(){ showScreen('call'); }
function showToast(msg, duration=3000){ const t=$('toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',duration); }
function setSt(msg,color){ $('lobStatus').textContent=msg; $('lobStatus').style.color=color; }
function closeReveal(){ $('revealModal').classList.remove('on'); }
function copyRevealedId(){ navigator.clipboard.writeText($('revealedId').textContent); showToast('Copied!'); }
function copyMyId(){ if(!myId)return; navigator.clipboard.writeText(myId); showToast('Your ID copied!'); }
</script>
