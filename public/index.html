<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Omegle Clone - Random Video Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        .header h1 {
            color: #333;
            font-size: 24px;
            font-weight: 600;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            background: #f0f0f0;
            border-radius: 20px;
            font-size: 14px;
            margin-top: 10px;
        }

        .status-badge.connected {
            background: #4CAF50;
            color: white;
        }

        .status-badge.waiting {
            background: #FF9800;
            color: white;
        }

        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .video-container {
            position: relative;
            background: #1a1a1a;
            border-radius: 15px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .video-label {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 10;
        }

        .no-video {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            text-align: center;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-width: 120px;
            justify-content: center;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
        }

        .btn-outline:hover {
            background: #667eea;
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .chat-section {
            border-top: 1px solid #e5e7eb;
            padding-top: 20px;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .chat-header h3 {
            color: #333;
            font-size: 18px;
        }

        .chat-messages {
            height: 200px;
            overflow-y: auto;
            background: #f9fafb;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .message {
            margin-bottom: 10px;
            animation: fadeIn 0.3s ease;
        }

        .message.system {
            text-align: center;
            color: #666;
            font-style: italic;
        }

        .message.own {
            text-align: right;
        }

        .message-content {
            display: inline-block;
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 15px;
            word-wrap: break-word;
        }

        .message.own .message-content {
            background: #667eea;
            color: white;
        }

        .message.other .message-content {
            background: #e5e7eb;
            color: #333;
        }

        .message-meta {
            font-size: 12px;
            color: #666;
            margin-top: 2px;
        }

        .chat-input-container {
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 25px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .chat-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .room-info {
            text-align: center;
            padding: 10px;
            background: #f3f4f6;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .room-id {
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
            cursor: pointer;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .video-grid {
                grid-template-columns: 1fr;
            }
            
            .btn {
                padding: 10px 16px;
                font-size: 14px;
                min-width: auto;
            }
            
            .container {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎥 Omegle Clone</h1>
            <div class="status-badge" id="statusBadge">Not Connected</div>
        </div>

        <div class="video-grid">
            <div class="video-container">
                <video id="localVideo" autoplay muted playsinline></video>
                <div class="video-label">You <span id="localName"></span></div>
                <div class="no-video" id="localNoVideo" style="display: none;">Camera off</div>
            </div>
            <div class="video-container">
                <video id="remoteVideo" autoplay playsinline></video>
                <div class="video-label" id="remoteLabel">Stranger</div>
                <div class="no-video" id="remoteNoVideo" style="display: none;">Waiting for stranger...</div>
            </div>
        </div>

        <div class="room-info" id="roomInfo" style="display: none;">
            Room ID: <span class="room-id" id="roomIdDisplay" onclick="copyRoomId()">-</span>
            <br><small style="color: #666;">Click to copy and share</small>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="findBtn" onclick="findStranger()">
                <span>🔍</span> Find Stranger
            </button>
            <button class="btn btn-danger" id="nextBtn" onclick="nextStranger()" disabled>
                <span>⏭️</span> Next
            </button>
            <button class="btn btn-outline" id="audioBtn" onclick="toggleAudio()">
                <span>🎤</span> Audio
            </button>
            <button class="btn btn-outline" id="videoBtn" onclick="toggleVideo()">
                <span>📹</span> Video
            </button>
            <button class="btn btn-danger" id="disconnectBtn" onclick="disconnect()" disabled>
                <span>❌</span> Disconnect
            </button>
        </div>

        <div class="chat-section">
            <div class="chat-header">
                <h3>💬 Chat</h3>
                <small id="chatStatus">Not connected to chat</small>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-container">
                <input type="text" class="chat-input" id="chatInput" placeholder="Type a message..." disabled>
                <button class="btn btn-primary" onclick="sendMessage()" id="sendBtn" disabled>Send</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        
        // State variables
        let localStream = null;
        let peerConnection = null;
        let currentRoomId = null;
        let remoteSocketId = null;
        let userName = "Guest" + Math.floor(Math.random() * 1000);
        let audioEnabled = true;
        let videoEnabled = true;
        let isConnected = false;

        // Configuration for WebRTC
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        // Initialize
        document.getElementById('localName').textContent = `(${userName})`;
        socket.emit('set-user-name', { userName });

        // Socket event handlers
        socket.on('waiting', () => {
            updateStatus('waiting', 'Looking for a stranger...');
            document.getElementById('findBtn').disabled = true;
            document.getElementById('findBtn').innerHTML = '<span class="loading-spinner"></span> Searching...';
            addSystemMessage('🔍 Looking for a stranger...');
        });

        socket.on('waiting-cancelled', () => {
            updateStatus('disconnected', 'Search cancelled');
            document.getElementById('findBtn').disabled = false;
            document.getElementById('findBtn').innerHTML = '<span>🔍</span> Find Stranger';
            addSystemMessage('❌ Search cancelled');
        });

        socket.on('matched', async ({ roomId, peer }) => {
            currentRoomId = roomId;
            remoteSocketId = peer.socketId;
            
            updateStatus('connected', `Connected to ${peer.userName}`);
            document.getElementById('roomInfo').style.display = 'block';
            document.getElementById('roomIdDisplay').textContent = roomId;
            document.getElementById('remoteLabel').textContent = peer.userName;
            document.getElementById('findBtn').disabled = true;
            document.getElementById('nextBtn').disabled = false;
            document.getElementById('disconnectBtn').disabled = false;
            document.getElementById('chatInput').disabled = false;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('chatStatus').textContent = `Chatting with ${peer.userName}`;
            
            addSystemMessage(`🎉 Connected to ${peer.userName}!`);
            
            // Initialize WebRTC
            await initializeMedia();
            await createPeerConnection();
            await createOffer();
        });

        socket.on('partner-disconnected', () => {
            addSystemMessage('👋 Stranger disconnected');
            cleanup();
            updateStatus('disconnected', 'Partner left');
        });

        socket.on('offer', async ({ offer, fromId }) => {
            if (!peerConnection) {
                await initializeMedia();
                await createPeerConnection();
            }
            
            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            
            socket.emit('answer', { targetId: fromId, answer });
        });

        socket.on('answer', async ({ answer }) => {
            if (peerConnection) {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
            }
        });

        socket.on('ice-candidate', async ({ candidate }) => {
            if (peerConnection && candidate) {
                await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
            }
        });

        socket.on('peer-media-state', ({ audioEnabled: peerAudio, videoEnabled: peerVideo }) => {
            // Update UI for peer's media state
            const remoteNoVideo = document.getElementById('remoteNoVideo');
            if (remoteNoVideo) {
                remoteNoVideo.style.display = peerVideo ? 'none' : 'block';
            }
        });

        socket.on('chat-message', ({ userName: senderName, message, timestamp }) => {
            addMessage(message, senderName, false, timestamp);
        });

        socket.on('user-left', ({ userName: leftUser }) => {
            addSystemMessage(`👋 ${leftUser} left the chat`);
            cleanup();
        });

        socket.on('error', ({ message }) => {
            alert(message);
        });

        // Media functions
        async function initializeMedia() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: videoEnabled,
                    audio: audioEnabled
                });
                
                const localVideo = document.getElementById('localVideo');
                localVideo.srcObject = localStream;
                
                document.getElementById('localNoVideo').style.display = videoEnabled ? 'none' : 'block';
            } catch (error) {
                console.error('Media error:', error);
                alert('Could not access camera/microphone');
            }
        }

        async function createPeerConnection() {
            peerConnection = new RTCPeerConnection(configuration);
            
            // Add local stream
            localStream.getTracks().forEach(track => {
                peerConnection.addTrack(track, localStream);
            });
            
            // Handle remote stream
            peerConnection.ontrack = (event) => {
                const remoteVideo = document.getElementById('remoteVideo');
                remoteVideo.srcObject = event.streams[0];
                document.getElementById('remoteNoVideo').style.display = 'none';
                isConnected = true;
            };
            
            // Handle ICE candidates
            peerConnection.onicecandidate = (event) => {
                if (event.candidate && remoteSocketId) {
                    socket.emit('ice-candidate', {
                        targetId: remoteSocketId,
                        candidate: event.candidate
                    });
                }
            };
            
            // Handle connection state
            peerConnection.onconnectionstatechange = () => {
                if (peerConnection.connectionState === 'connected') {
                    console.log('WebRTC connected');
                }
            };
        }

        async function createOffer() {
            if (!peerConnection) return;
            
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            
            socket.emit('offer', { targetId: remoteSocketId, offer });
        }

        // UI functions
        function findStranger() {
            socket.emit('find-stranger');
        }

        function nextStranger() {
            if (confirm('Skip to next stranger?')) {
                socket.emit('next-stranger');
                cleanup();
                setTimeout(() => findStranger(), 500);
            }
        }

        function toggleAudio() {
            if (localStream) {
                const audioTrack = localStream.getAudioTracks()[0];
                if (audioTrack) {
                    audioTrack.enabled = !audioTrack.enabled;
                    audioEnabled = audioTrack.enabled;
                    const btn = document.getElementById('audioBtn');
                    btn.style.background = audioEnabled ? '' : '#ef4444';
                    btn.style.color = audioEnabled ? '' : 'white';
                    
                    if (currentRoomId) {
                        socket.emit('media-state', {
                            roomId: currentRoomId,
                            audioEnabled,
                            videoEnabled
                        });
                    }
                }
            }
        }

        function toggleVideo() {
            if (localStream) {
                const videoTrack = localStream.getVideoTracks()[0];
                if (videoTrack) {
                    videoTrack.enabled = !videoTrack.enabled;
                    videoEnabled = videoTrack.enabled;
                    const btn = document.getElementById('videoBtn');
                    btn.style.background = videoEnabled ? '' : '#ef4444';
                    btn.style.color = videoEnabled ? '' : 'white';
                    
                    document.getElementById('localNoVideo').style.display = videoEnabled ? 'none' : 'block';
                    
                    if (currentRoomId) {
                        socket.emit('media-state', {
                            roomId: currentRoomId,
                            audioEnabled,
                            videoEnabled
                        });
                    }
                }
            }
        }

        function disconnect() {
            cleanup();
            updateStatus('disconnected', 'Disconnected');
            document.getElementById('roomInfo').style.display = 'none';
            document.getElementById('findBtn').disabled = false;
            document.getElementById('findBtn').innerHTML = '<span>🔍</span> Find Stranger';
            document.getElementById('nextBtn').disabled = true;
            document.getElementById('disconnectBtn').disabled = false;
            document.getElementById('chatInput').disabled = true;
            document.getElementById('sendBtn').disabled = true;
            document.getElementById('chatStatus').textContent = 'Not connected to chat';
            
            addSystemMessage('💔 You disconnected');
        }

        function cleanup() {
            // Close peer connection
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            
            // Stop local stream
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            
            // Clear remote video
            const remoteVideo = document.getElementById('remoteVideo');
            if (remoteVideo) {
                remoteVideo.srcObject = null;
            }
            
            document.getElementById('remoteNoVideo').style.display = 'block';
            remoteSocketId = null;
            currentRoomId = null;
            isConnected = false;
            
            // Leave room on server
            if (socket) {
                socket.emit('cancel-waiting');
            }
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (message && currentRoomId) {
                socket.emit('chat-message', { roomId: currentRoomId, message });
                addMessage(message, userName, true);
                input.value = '';
            }
        }

        function addMessage(text, sender, isOwn = false, timestamp = null) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isOwn ? 'own' : 'other'}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;
            
            const metaDiv = document.createElement('div');
            metaDiv.className = 'message-meta';
            const time = timestamp ? new Date(timestamp).toLocaleTimeString() : new Date().toLocaleTimeString();
            metaDiv.textContent = `${sender} • ${time}`;
            
            messageDiv.appendChild(contentDiv);
            messageDiv.appendChild(metaDiv);
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addSystemMessage(text) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message system';
            messageDiv.textContent = text;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function updateStatus(type, text) {
            const badge = document.getElementById('statusBadge');
            badge.className = 'status-badge';
            if (type === 'connected') {
                badge.classList.add('connected');
            } else if (type === 'waiting') {
                badge.classList.add('waiting');
            }
            badge.textContent = text;
        }

        function copyRoomId() {
            const roomId = document.getElementById('roomIdDisplay').textContent;
            if (roomId && roomId !== '-') {
                navigator.clipboard.writeText(roomId);
                alert('Room ID copied to clipboard!');
            }
        }

        // Enter key to send message
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Clean up on page unload
        window.addEventListener('beforeunload', () => {
            cleanup();
        });
    </script>
</body>
</html>
